name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./... -v

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build linux binaries
        run: |
          mkdir -p dist/linux/amd64 dist/linux/arm64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/linux/amd64/gsdw ./cmd/gsdw
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o dist/linux/arm64/gsdw ./cmd/gsdw

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: dist
          file: Dockerfile.container
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/the-artificer-of-ciphers-llc/gsdw:${{ steps.version.outputs.version }}
            ghcr.io/the-artificer-of-ciphers-llc/gsdw:latest
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.title=gsdw
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
