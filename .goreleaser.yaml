version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: gsdw
    binary: gsdw
    main: ./cmd/gsdw
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/The-Artificer-of-Ciphers-LLC/gsd-wired/internal/version.version={{.Version}}
      - -X github.com/The-Artificer-of-Ciphers-LLC/gsd-wired/internal/version.commit={{.Commit}}
      - -X github.com/The-Artificer-of-Ciphers-LLC/gsd-wired/internal/version.date={{.Date}}

archives:
  - id: gsdw
    ids: [gsdw]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

binary_signs:
  - id: macos-sign
    cmd: ./scripts/sign-and-notarize.sh
    args: ["${artifact}", "${signature}"]
    artifacts: binary
    ids: [gsdw]
    signature: "${artifact}_{{ .Os }}_{{ .Arch }}.sig"
    output: true

homebrew_casks:
  - name: gsdw-cc
    binaries:
      - gsdw
    repository:
      owner: The-Artificer-of-Ciphers-LLC
      name: homebrew-gsdw
      branch: main
      token: "{{ .Env.GSDWHOMEBREW }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/The-Artificer-of-Ciphers-LLC/gsd-wired"
    description: "GSD + Beads/Dolt workflow orchestration for Claude Code"
    license: "MIT"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}"]
    skip_upload: auto

dockers_v2:
  - images:
      - "ghcr.io/the-artificer-of-ciphers-llc/gsdw"
    tags:
      - "{{ .Version }}"
      - "latest"
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "gsdw"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
